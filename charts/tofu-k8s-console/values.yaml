image:
  repository: ghcr.io/twiechert/tofu-k8s-console
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tofu-console.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

rbac:
  create: true
  # clusterWide grants access to all namespaces. Set to false and specify
  # rbac.namespaces to restrict access to specific namespaces.
  clusterWide: true
  namespaces: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
