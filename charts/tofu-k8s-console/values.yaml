image:
  repository: ghcr.io/twiechert/tofu-k8s-console
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tofu-console.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

rbac:
  create: true
  # clusterWide grants access to all namespaces. Set to false and specify
  # rbac.namespaces to restrict access to specific namespaces.
  clusterWide: true
  namespaces: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

resources: {}

# Auth configuration. Mode: "none" (default), "oidc", or "header".
auth:
  mode: "none"

  # OIDC settings (when mode=oidc)
  oidc:
    issuerURL: ""
    clientID: ""
    clientSecret: ""
    redirectURL: ""
    scopes: ["openid", "profile", "email"]

  # Header settings (when mode=header, for use with oauth2-proxy etc.)
  header:
    userHeader: "X-Forwarded-User"
    emailHeader: "X-Forwarded-Email"
    groupsHeader: "X-Forwarded-Groups"
    # JWT claim extraction (e.g. for Cloudflare Access + Zitadel)
    # Set jwtHeader to decode a JWT and extract email/name/groups from claims.
    # The JWT is NOT verified — it's assumed pre-validated by the proxy.
    jwtHeader: ""              # e.g. "Cf-Access-Jwt-Assertion"
    jwtEmailClaim: "email"     # claim path for email
    jwtNameClaim: "name"       # claim path for display name
    jwtGroupsClaim: "groups"   # claim path for groups/roles (e.g. "custom:roles", "realm_access.roles")

  # Role mappings
  roleMappings: []
  #  - match: group
  #    value: platform-team
  #    role: admin
  #  - match: email
  #    value: "*@example.com"
  #    role: viewer

  defaultRole: viewer

nodeSelector: {}
tolerations: []
affinity: {}
