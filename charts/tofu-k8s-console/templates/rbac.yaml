{{- if .Values.rbac.create }}
{{- if .Values.rbac.clusterWide }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tofu-k8s-console
rules:
  # Read TofuProject and TofuProgram CRDs
  - apiGroups: ["tofu.example.com"]
    resources: ["tofuprojects", "tofuprograms"]
    verbs: ["get", "list", "watch", "patch"]
  # Read revision ConfigMaps and Jobs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tofu-k8s-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tofu-k8s-console
subjects:
  - kind: ServiceAccount
    name: {{ include "tofu-k8s-console.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- range .Values.rbac.namespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tofu-k8s-console
  namespace: {{ . }}
rules:
  - apiGroups: ["tofu.example.com"]
    resources: ["tofuprojects", "tofuprograms"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-k8s-console
  namespace: {{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tofu-k8s-console
subjects:
  - kind: ServiceAccount
    name: {{ include "tofu-k8s-console.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
---
{{- end }}
{{- end }}
{{- end }}
